<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900">
<nav class="bg-slate-800 fixed w-full z-20 top-0 start-0 border-b border-slate-700">
  <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
    <span class="self-center text-xl text-white font-semibold whitespace-nowrap">Billing Subsystem</span>
    <button type="button" class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-slate-400 rounded-lg md:hidden hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-600">
      <span class="sr-only">Open main menu</span>
      <svg class="w-6 h-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M5 7h14M5 12h14M5 17h14"/></svg>
    </button>
    <div class="hidden w-full md:block md:w-auto" id="navbar-default">
      <ul class="font-medium flex flex-col p-4 md:p-0 mt-4 border border-slate-700 rounded-lg bg-slate-800 md:flex-row md:space-x-8 md:mt-0 md:border-0">
        <li>
          <a href="login.html" class="block py-2 px-3 text-white rounded hover:text-blue-400 md:p-0 transition">Login</a>
        </li>
        <li>
          <a href="subscription.html" class="block py-2 px-3 text-white rounded hover:text-blue-400 md:p-0 transition">Subscription</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

  <div class="min-h-screen flex items-center justify-center">
  <div class="bg-slate-800 rounded-2xl p-8 w-full max-w-lg shadow-xl">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-white text-xl font-semibold">Add new user</h2>
      <button id="close-btn" class="text-slate-400 hover:text-white transition text-lg">✕</button>
    </div>

    <hr class="border-slate-600 mb-6" />

    <div class="grid grid-cols-2 gap-4">

      <div>
        <label class="block text-white text-sm font-medium mb-2">Username</label>
        <input type="text" placeholder="jasonle248@gmail.com"
          class="w-full bg-slate-700 text-white text-sm rounded-lg px-4 py-2.5 border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-slate-400" />
      </div>

      <div>
        <label class="block text-white text-sm font-medium mb-2">Email</label>
        <input type="email" placeholder="jasonle248@gmail.com"
          class="w-full bg-slate-600 text-white text-sm rounded-lg px-4 py-2.5 border border-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-slate-300" />
      </div>

      <div>
        <label class="block text-white text-sm font-medium mb-2">Password</label>
        <input type="password" placeholder="••••••••••"
          class="w-full bg-slate-700 text-white text-sm rounded-lg px-4 py-2.5 border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-slate-400" />
      </div>

      <div>
        <label class="block text-white text-sm font-medium mb-2">Confirm password</label>
        <input type="password" placeholder="••••••••••"
          class="w-full bg-slate-700 text-white text-sm rounded-lg px-4 py-2.5 border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-slate-400" />
      </div>
  </div>

    <button onclick="window.location.href='login.html'" id="submit-btn" class="mt-6 flex items-center gap-2 bg-blue-600 hover:bg-blue-700 transition text-white text-sm font-semibold px-5 py-2.5 rounded-lg">
      + Add new user
    </button>

    </div>
    </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/datepicker.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
</body>
</html>
